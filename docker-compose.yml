services:
  db:
    image: postgres:16-alpine
    container_name: taskmanager-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmanager-api
    depends_on:
      - db
    env_file:
      - .env.example
    environment:
      DB_HOST: db
    ports:
      - "8080:8080"

volumes:
  db-data: